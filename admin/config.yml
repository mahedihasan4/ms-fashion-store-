backend:
  name: github
  repo: mahedihasan4/MS-Fashion-Store- # 👈 এখানে আপনার গিটহাব ইউজারনেম/রিপোজিটরি নাম দিন (যেমন: mahedi/ms-fashion-store)
  branch: main # বা master হলে master লিখুন

media_folder: "images/uploads" # আপনার আপলোড করা ছবিগুলো এই ফোল্ডারে জমা হবে
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "প্রোডাক্টসমূহ"
    folder: "data/products" # প্রতিটি প্রোডাক্টের ডেটা এখানে ফাইল হিসেবে জমা হবে
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "প্রোডাক্ট আইডি (ID)", name: "id", widget: "number" }
      - { label: "প্রোডাক্টের নাম (Product Name)", name: "name", widget: "string" }
      - { label: "ক্যাটাগরি (Category)", name: "category", widget: "select", options: ["Saree", "Three Piece", "One Piece"] }
      - { label: "মূল্য (Price)", name: "price", widget: "number" }
      - { label: "প্রোডাক্টের বিবরণ (Description)", name: "description", widget: "text" }
      - { label: "ডিটেইলস/স্পেসিফিকেশন (Details)", name: "details", widget: "list", summary: "{{fields.detail}}" }
      - { 
          label: "কালার ভ্যারিয়েন্ট (Colors)", 
          name: "colors", 
          widget: "list", 
          fields: [
            { label: "কালারের নাম (যেমন: মেরুন)", name: "name", widget: "string" },
            { label: "কালার কোড (Hex Code - যেমন: #800000)", name: "hex", widget: "string" },
            { label: "প্রোডাক্টের ছবি আপলোড করুন (Images)", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" } }
          ]
        }
